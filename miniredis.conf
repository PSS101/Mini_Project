# Mini Redis Configuration File
# =============================
# Lines starting with # are comments.
# Format: directive value

# TCP port to listen on
port 6379

# Number of hash buckets in the main keyspace
store-size 256

# Append-Only File persistence
aof-enabled yes
aof-file miniredis.aof

# RDB snapshot persistence
rdb-enabled yes
rdb-file miniredis.rdb

# Active expiry: how many times per second to run the expiry cycle
# Higher values = more CPU, lower latency on expired key cleanup
active-expiry-hz 10
